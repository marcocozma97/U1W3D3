<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <title>ToDoList</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h1>Le mie cose da fare</h1>

    <form id="form-task">
        <input id="campo-task" placeholder="Cosa devi fare?" />
        <button type="submit">Aggiungi</button>
    </form>

    <p id="errore" class="errore"></p>

    <div class="filtri">
        <button data-filtro="tutti" class="attivo">Tutti</button>
        <button data-filtro="attivi">Attivi</button>
        <button data-filtro="completati">Completati</button>
    </div>

    <ul id="lista-task"></ul>

    <p>Attivi: <span id="contatore">0</span></p>

    <script src="script.js"></script>
</body>

</html>
